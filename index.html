<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfumito Challenge • ML Importaciones</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo Header -->
  <div class="logo-header">
    <img src="logo.png" alt="ML Importaciones" class="logo">
  </div>

  <div id="welcome" class="screen active">
    <div class="card">
      <span class="mascot">🧴✨</span>
      <h1>Perfumito Challenge</h1>
      <p class="subtitle">Demuestra tu conocimiento y gana <strong>10% OFF</strong></p>
      <button onclick="startRules()">🚀 INICIAR CHALLENGE</button>
    </div>
  </div>

  <div id="rules" class="screen">
    <div class="card">
      <h2>Reglas del Juego</h2>
      <ul>
        <li>⏱ 60 segundos</li>
        <li>✅ 5 respuestas correctas</li>
        <li>🏆 Código de 10% OFF real</li>
      </ul>
      <button onclick="startGame()">⚡ EMPEZAR AHORA</button>
    </div>
  </div>

  <div id="game" class="screen">
    <div class="card">
      <h3>Pregunta <span id="qnum">1</span>/5</h3>
      <p id="question"></p>
      <div id="options"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
